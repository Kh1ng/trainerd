name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest
      - name: Verify tag matches package version
        shell: bash
        run: |
          package_version="$(python -c 'import trainerd; print(trainerd.__version__)')"
          test "v${package_version}" = "${GITHUB_REF_NAME}"
      - run: python -m build
      - run: python -m twine check dist/*
      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS
      - name: Create immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes --verify-tag
